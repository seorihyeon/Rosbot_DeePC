collect_node:
  ros__parameters:
    use_sim_time: true

    cmd_topic: /cmd_vel
    odom_topic: /model/rosbot/odometry_gt
    path_topic: /deepc/reference_path

    sample_time: 0.05

    reference_csv_list:
      - /ws/ref/mosaic/straight_long.csv
      - /ws/ref/mosaic/wave_lr.csv
      - /ws/ref/mosaic/wave_rl.csv
    append_final_stop_steps: 20

    kx: 0.8
    ky: 1.8
    kpsi: 2.0

    v_min: -0.2
    v_max: 0.45
    w_min: -1.2
    w_max: 1.2

    warmup_steps: 20

    output_dir: /ws/datasets/mosaic
    file_prefix: collect

    enable_perturbation: true
    perturb_after_warmup_only: true

    dv_perturb_min: -0.1
    dv_perturb_max:  0.1
    dw_perturb_min: -0.5
    dw_perturb_max:  0.5

    perturb_hold_steps_min: 4
    perturb_hold_steps_max: 10

    min_perturb_norm: 0.01

    reset_before_each_reference: true
    reset_topic: /reset_rosbot
    reset_settle_steps: 40